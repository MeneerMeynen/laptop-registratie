
services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - laptop-net

  app:
    build: .
    ports:
      - "8000:8000"
    # Also accessible via nginx on 443 for HTTPS/mobile workflow
    environment:
      # Override DATABASE_URL so the app always reaches the 'db' service inside Docker.
      # This takes precedence over any .env file value (which uses localhost for local dev).
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@db:3306/laptops
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-changeme}
      SESSION_SECRET: ${SESSION_SECRET:-dev-insecure-secret-please-set}
      DEBUG: ${DEBUG:-false}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - laptop-net

  test:
    build: .
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@db:3306/laptops_test
      PYTHONPATH: /app
      AUTH_USERNAME: test
      AUTH_PASSWORD: test
      SESSION_SECRET: test-session-secret-test-session-secret
      DEBUG: "true"
    command: pytest -v --ignore=tests/e2e
    depends_on:
      db:
        condition: service_healthy
    networks:
      - laptop-net

  db:
    image: mariadb:lts
    container_name: mariadb-laptop
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: laptops
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - laptop-net

  test-e2e:
    image: mcr.microsoft.com/playwright/python:v1.58.0-jammy
    working_dir: /app
    volumes:
      - .:/app
    environment:
      PYTHONPATH: /app
      E2E_USERNAME: ${AUTH_USERNAME:-admin}
      E2E_PASSWORD: ${AUTH_PASSWORD:-changeme}
    command: >
      bash -c "pip install --quiet pytest pytest-playwright &&
               until curl -sf http://app:8000/ > /dev/null; do sleep 2; done &&
               pytest tests/e2e/ -v --base-url http://app:8000 --confcutdir=tests/e2e"
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy
    networks:
      - laptop-net

volumes:
  mariadb_data:
  uploads_data:

networks:
  laptop-net:
