{% extends "base.html" %}

{% block title %}Inloggen — Laptop Registratie{% endblock %}

{% block content %}
<main class="login-page">
  <form class="login-card" method="post" action="/login" autocomplete="on">
    <h1 class="login-title">Laptop Registratie</h1>
    <p class="login-subtitle">Log in om verder te gaan.</p>

    {% if error %}
    <div class="login-error" role="alert">
      Onjuiste gebruikersnaam of wachtwoord.
    </div>
    {% endif %}

    <label class="login-field">
      <span>Gebruikersnaam</span>
      <input type="text" name="username" autocomplete="username" required autofocus>
    </label>

    <label class="login-field">
      <span>Wachtwoord</span>
      <input type="password" name="password" autocomplete="current-password" required>
    </label>

    <input type="hidden" name="next" value="{{ next }}">

    <button type="submit" class="login-button">Inloggen</button>
  </form>
</main>

<style>
  .login-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    background: var(--bg, #f6f7f9);
  }
  .login-card {
    width: 100%;
    max-width: 360px;
    padding: 2rem;
    background: var(--card, #fff);
    border: 1px solid var(--border, #e3e5e8);
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
    display: flex;
    flex-direction: column;
    gap: 1rem;
    font-family: 'Instrument Sans', system-ui, sans-serif;
  }
  .login-title {
    margin: 0;
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--muted, #6b7280);
  }
  .login-subtitle {
    margin: -0.5rem 0 0.5rem;
    color: var(--muted, #6b7280);
    font-size: 0.95rem;
  }
  .login-field {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
    font-size: 0.9rem;
  }
  .login-field input {
    padding: 0.6rem 0.75rem;
    border: 1px solid var(--border, #d0d4d9);
    border-radius: 8px;
    font: inherit;
    background: var(--input-bg, #fff);
    color: inherit;
  }
  .login-field input:focus {
    outline: 2px solid var(--accent, #2563eb);
    outline-offset: 1px;
  }
  .login-button {
    margin-top: 0.5rem;
    padding: 0.7rem 1rem;
    border: none;
    border-radius: 8px;
    background: var(--accent, #2563eb);
    color: #fff;
    font: inherit;
    font-weight: 600;
    cursor: pointer;
  }
  .login-button:hover {
    filter: brightness(1.05);
  }
  .login-error {
    padding: 0.6rem 0.75rem;
    border-radius: 8px;
    background: #fee2e2;
    color: #991b1b;
    font-size: 0.9rem;
  }
</style>
{% endblock %}
